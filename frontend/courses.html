<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Courses | EduFlow</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray">
    <header class="navbar">
        <div class="container nav-container">
            <a href="index.html" class="logo"><i class="fas fa-graduation-cap"></i> EduFlow</a>
            <button class="mobile-toggle" id="mobile-toggle"><i class="fas fa-bars"></i></button>
            <nav class="nav-menu" id="nav-menu">
                <ul class="nav-list" id="nav-list-courses">
                    <li class="nav-item"><a href="index.html" class="nav-link">Home</a></li>
                    <li class="nav-item"><a href="courses.html" class="nav-link active">Courses</a></li>
                    <!-- JS will inject Dashboard/Logout or Login/Register dynamically -->
                </ul>
            </nav>
        </div>
    </header>

    <main class="page-content">
        <div class="page-header bg-gradient text-white">
            <div class="container">
                <h1>Available Courses</h1>
                <p>Browse and explore the courses offered for the upcoming semester.</p>
            </div>
        </div>
        
        <div class="container courses-container">
            <aside class="filters-sidebar">
                <div class="glass-card pd-4">
                    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1rem;">
                        <h3>Filters</h3>
                        <button id="reset-filters" class="btn btn-sm" style="font-size:0.8rem; padding:4px 10px; border:1px solid var(--border); color:var(--text-muted);">Reset</button>
                    </div>
                    <div class="form-group">
                        <label for="filter-search"><i class="fas fa-search" style="margin-right:5px;"></i>Search</label>
                        <input type="text" id="filter-search" placeholder="Course name or code..." style="width:100%; padding:0.6rem 1rem; border:1px solid var(--border); border-radius:0.5rem; font-family:inherit;">
                    </div>
                    <div class="form-group">
                        <label for="filter-dept"><i class="fas fa-building" style="margin-right:5px;"></i>Department</label>
                        <select id="filter-dept" style="width:100%; padding:0.6rem 1rem; border:1px solid var(--border); border-radius:0.5rem; font-family:inherit;">
                            <option value="">All Departments</option>
                            <option value="CS">Computer Science</option>
                            <option value="ENG">Engineering</option>
                            <option value="MATH">Mathematics</option>
                            <option value="PHY">Physics</option>
                            <option value="ART">Arts & Humanities</option>
                            <option value="BUS">Business</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="filter-status"><i class="fas fa-chair" style="margin-right:5px;"></i>Availability</label>
                        <select id="filter-status" style="width:100%; padding:0.6rem 1rem; border:1px solid var(--border); border-radius:0.5rem; font-family:inherit;">
                            <option value="">All</option>
                            <option value="Available">Available</option>
                            <option value="Warning">Almost Full</option>
                            <option value="Full">Full / Waitlist</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label for="filter-credits"><i class="fas fa-star" style="margin-right:5px;"></i>Credits</label>
                        <select id="filter-credits" style="width:100%; padding:0.6rem 1rem; border:1px solid var(--border); border-radius:0.5rem; font-family:inherit;">
                            <option value="">Any Credits</option>
                            <option value="2">2 Credits</option>
                            <option value="3">3 Credits</option>
                            <option value="4">4 Credits</option>
                        </select>
                    </div>
                    <div id="filter-count" style="font-size:0.85rem; color:var(--text-muted); margin-top:0.5rem; text-align:center;"></div>
                </div>
            </aside>
            
            <section class="courses-list">
                <div class="courses-grid" id="courses-grid">
                    <!-- Dynamic content injected here via DOM API in courses.js -->
                </div>
            </section>
        </div>
    </main>

    <script src="js/main.js"></script>
    <script src="js/api.js"></script>
    <script src="js/courses.js"></script>
</body>
</html>
